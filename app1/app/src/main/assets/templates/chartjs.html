<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../chartjs/chart.min.js"></script>
    <style>
        body { margin: 0; padding: 16px; background-color: #ffffff; height: 100vh; box-sizing: border-box; }
        @media (prefers-color-scheme: dark) {
            body { background-color: #1e1e1e; }
        }
        .chart-container { position: relative; height: 100%; width: 100%; }
    </style>
</head>
<body>
    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>
    <script>
        var completionReported = false;
        function reportReady() {
            if (completionReported) return;
            completionReported = true;
            window.__everytalkPreviewReady();
        }
        function reportError(error) {
            if (completionReported) return;
            completionReported = true;
            window.__everytalkPreviewError(error);
        }

        try {
            var ctx = document.getElementById('myChart').getContext('2d');
            var rawCode = `<!-- CONTENT_PLACEHOLDER -->`;
            var config;

            try {
                config = eval('(' + rawCode + ')');
            } catch (parseError) {
                try {
                    eval(rawCode);
                } catch (executionError) {
                    throw new Error('Failed to parse Chart.js config: ' + executionError.message);
                }
            }

            if (!config || typeof config !== 'object') {
                throw new Error('Chart.js config must be an object');
            }

            if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                Chart.defaults.color = '#ffffff';
                Chart.defaults.borderColor = '#444444';
            }

            var plugins = Array.isArray(config.plugins) ? config.plugins.slice() : [];
            plugins.push({
                id: 'everytalk-preview-completion',
                afterRender: reportReady
            });
            config.plugins = plugins;
            new Chart(ctx, config);
        } catch (error) {
            reportError(error);
        }
    </script>
</body>
</html>
